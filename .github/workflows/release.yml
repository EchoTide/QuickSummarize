name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        run: |
          node -e "const fs=require('fs'); const version=process.env.RELEASE_TAG.replace(/^v/, ''); for (const file of ['package.json','extension/manifest.json']) { const data=JSON.parse(fs.readFileSync(file,'utf8')); data.version=version; fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n'); }"

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Prepare release archive
        run: |
          mkdir -p release
          zip -r "release/quicksummarize-${{ env.RELEASE_TAG }}.zip" extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release/quicksummarize-${{ env.RELEASE_TAG }}.zip
